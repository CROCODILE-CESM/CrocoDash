name: Pytest Testing

on: [push, workflow_dispatch]

permissions:
  contents: write
env:
  CIME_MACHINE: ubuntu-latest
  DIN_LOC_ROOT: /workspace
  CIME_OUTPUT_ROOT: /workspace
  USER: ${{ github.actor }}
  WORKDIR: /workspace
jobs:
  pytest:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/crocodile-cesm/crocontainer:amd64
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
      - name: Install GPG (for CodeCoverage)
        run: apt-get update && apt-get install -y gnupg git bash curl gpg
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          path: CrocoDash
      - name: Check if environment.yml changed
        id: compare
        run: |
          echo "=== ENVIRONMENT VARIABLES ==="
          echo "WORKDIR value: '${{ env.WORKDIR }}' (or literal: $WORKDIR)"
          echo "GITHUB_WORKSPACE value: '${{ github.workspace }}'"
          echo "Current working directory (pwd): $(pwd)"
          if diff $WORKDIR/CrocoDash/environment.yml $GITHUB_WORKSPACE/CrocoDash/environment.yml; then
            echo "No changes in environment.yml"
            echo "env_changed=false" >> $GITHUB_OUTPUT
          else
            echo "environment.yml changed!"
            echo "env_changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Copy CrocoDash into container
        run: |
              rm -rf $WORKDIR/CrocoDash
              cp -r $GITHUB_WORKSPACE/CrocoDash $WORKDIR/
      - name: Create CrocoDash environment if changed
        if: steps.compare.outputs.env_changed == 'true'
        run: |
          echo "Environment changed! Rebuilding CrocoDash conda environment..."
          conda env remove -n CrocoDash --yes
          conda env create -f $WORKDIR/CrocoDash/environment.yml
      - name: Run Pytest
      # Force a login bash shell to natively enable conda profile utilities
        shell: bash -l {0}
        run: |
          cd $WORKDIR/CrocoDash
          source /opt/conda/etc/profile.d/conda.sh
          conda activate CrocoDash
          pytest --ignore=CrocoDash/visualCaseGen -m "not workflow" -vv --showlocals --tb=short --cov=CrocoDash --cov-report=xml --cov-branch
          cp $WORKDIR/CrocoDash/coverage.xml $GITHUB_WORKSPACE/CrocoDash
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
         token: ${{ secrets.CODECOV_TOKEN }}
         slug: CROCODILE-CESM/CrocoDash
         files: CrocoDash/coverage.xml
      # Create the CrocoDash Bundle
      - name: Download GEBCO subset
        run: wget https://crocodile-cesm.s3.amazonaws.com/CrocoDash/data/gebco/gebco_2026_n20.0_s0.0_w-90.0_e-70.0.nc -O $GITHUB_WORKSPACE/gebco.nc
      - name: Run setup_case.py
        shell: bash -l {0}
        run: |
          source /opt/conda/etc/profile.d/conda.sh
          conda activate CrocoDash
          python $GITHUB_WORKSPACE/CrocoDash/tests/generate_small_test_case.py \
            --cesmroot /workspace/CESM \
            --caseroot /workspace/croc_cases \
            --inputdir /workspace/croc_input \
            --casename actions_case \
            --machine ubuntu-latest \
            --project PLACEHOLDER \
            --bathymetry-path $GITHUB_WORKSPACE/gebco.nc
      - name: Checkout cli_start_share into container
        uses: actions/checkout@v4
        with:
          ref: cli_start_share
          path: CrocoDash-bundle
      - name: Install cli_start_share into existing env
        shell: bash -l {0}
        run: |
          source /opt/conda/etc/profile.d/conda.sh
          conda activate CrocoDash
          rm -rf $WORKDIR/CrocoDash
          cp -r $GITHUB_WORKSPACE/CrocoDash-bundle $WORKDIR/CrocoDash
          pip install -e $WORKDIR/CrocoDash

      - name: Bundle case with crocodash read
        shell: bash -l {0}
        run: |
          source /opt/conda/etc/profile.d/conda.sh
          conda activate CrocoDash
          mkdir -p $GITHUB_WORKSPACE/bundle_output
          crocodash read \
            --caseroot /workspace/croc_cases/actions_case \
            --output-dir $GITHUB_WORKSPACE/bundle_output \
            --cesmroot /workspace/CESM \
            --machine ubuntu-latest \
            --project PLACEHOLDER
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: cesm-bundle-actions_case
          path: ${{ github.workspace }}/bundle_output
          retention-days: 1
  run_cesm_crocontainer:
    needs: pytest
    runs-on: gha-runner-crocodash
    permissions:
      contents: read     # Allows checking out code
      packages: write    # Crucial: Allows authenticating with GHCR
    steps:
      - name: Install Apptainer
        run: |
          sudo apt update && sudo apt install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt update
          sudo apt-get install -y apptainer

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: cesm-bundle-actions_case
          path: ${{ github.workspace }}/bundle_output
      - name: Build Sandbox Container
        env:
          APPTAINER_DOCKER_USERNAME: ${{ github.actor }}
          APPTAINER_DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          apptainer build --sandbox workspace_sandbox/ \
            docker://ghcr.io/crocodile-cesm/crocontainer:amd64-3

      - name: Run CESM
        run: |
          mkdir ${{ github.workspace }}/cesm_scratch
          apptainer exec \
            --writable \
            --env GIT_AUTHOR_NAME="${{ github.actor }}" \
            --env GIT_AUTHOR_EMAIL="${{ github.actor_id }}+${{ github.actor }}@github.com" \
            --env GIT_COMMITTER_NAME="${{ github.actor }}" \
            --env GIT_COMMITTER_EMAIL="${{ github.actor_id }}+${{ github.actor }}@github.com" \
            --bind /glade/campaign/cesm/cesmdata/inputdata:/root/cesm/inputdata \
            --bind ${{ github.workspace }}/cesm_scratch:/root/cesm/scratch \
            --bind ${{ github.workspace }}/bundle_output:/workspace/bundle \
            workspace_sandbox/ \
            /bin/bash /workspace/run_case.sh