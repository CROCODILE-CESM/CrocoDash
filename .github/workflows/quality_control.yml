name: Quality Control

on: [pull_request]

jobs:
  check-glade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Search for '/glade' in CrocoDash/, tests/, demos/
        run: |
          .github/scripts/check_glade_quality_control.sh
  check-notebook-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Check all notebooks (except BGC.ipynb) are in run_notebooks.yml matrix
        run: |
          bash dev_tools/check_notebook_coverage.sh
  check-black:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run black code formatter check
        uses: psf/black@stable
        with:
          options: "--check"
          src: "CrocoDash tests" # This isn't a recursive checkout, so rm6 and visualCasegen won't be checked
