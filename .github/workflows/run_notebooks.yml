name: Run CrocoDash Notebooks

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 6 * * *'

jobs:
  run_notebooks:
    runs-on: gha-runner-crocodash
    container:
      image: ghcr.io/crocodile-cesm/crocodash:nightly
      options: --pull always
    steps:
      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          path: CrocoDash

      - name: Copy CrocoDash into container workdir
        run: |
          rm -rf $WORKDIR/CrocoDash
          cp -r $GITHUB_WORKSPACE/CrocoDash $WORKDIR/

      - name: Set CI case paths
        run: |
          sed -i "s|<inputdir>|$WORKDIR/ci_input|g" $WORKDIR/CrocoDash/demos/code/ci_case_setup.ipynb
          sed -i "s|<casedir>|$WORKDIR/ci_cases|g" $WORKDIR/CrocoDash/demos/code/ci_case_setup.ipynb
          sed -i "s|\"Checkout\"|\"$CESMROOT\"|g" $WORKDIR/CrocoDash/demos/code/path_to_datasets.json

      - name: Inject paths into notebooks
        run: |
          cd $WORKDIR/CrocoDash/demos
          conda run -n CrocoDash python code/inject_paths_into_notebooks.py

      - name: Create CI case
        run: |
          cd $WORKDIR/CrocoDash/demos
          HDF5_USE_FILE_LOCKING=FALSE conda run -n CrocoDash jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.timeout=600 \
            code/ci_case_setup.ipynb

      - name: Run CrocoDash notebooks
        run: |
          cd $WORKDIR/CrocoDash/demos
          export HDF5_USE_FILE_LOCKING=FALSE
          find gallery/notebooks/CrocoDash -name "*.ipynb" \
            ! -path "*/.ipynb_checkpoints/*" \
            ! -name "BGC.ipynb" \
            | sort \
            | xargs -I {} conda run -n CrocoDash \
                jupyter nbconvert --to notebook --execute --inplace \
                --ExecutePreprocessor.timeout=600 \
                --TagRemovePreprocessor.enabled=True \
                --TagRemovePreprocessor.remove_cell_tags='["ci-skip"]' \
                {}
