name: Run CESM Crocontainer

on:
  push:


jobs:
  run_cesm:
    runs-on: gha-runner-crocodash
    steps:
      - name: Install Apptainer
        run: |
          sudo apt update && sudo apt install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt update
          sudo apt-get install -y apptainer

      - name: Build sandbox
        run: |
          apptainer build --sandbox workspace_sandbox/ \
            docker://ghcr.io/crocodile-cesm/crocontainer:amd64

      - name: Run CESM
        run: |
          apptainer exec \
            --writable \
            --bind /glade/campaign/cesm/cesmdata/inputdata:/root/cesm/inputdata \
            --bind /glade/derecho/scratch/manishrv:/root/cesm/scratch \
            --bind /glade/campaign/cesm/cesmdata/inputdata/ocn/mom/croc/bundles/bundle:/workspace/bundle \
            --bind ${{ github.workspace }}/run_case.sh:/workspace/run_case.sh \
            workspace_sandbox/ \
            /bin/bash /workspace/run_case.sh