name: Deploy Sphinx Documentation

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: write
  pull-requests: write


jobs:
  docs:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/crocodile-cesm/crocodash:nightly
    steps:
      - uses: actions/checkout@v4
        with:
            submodules: recursive
      - name: Check API docs are up to date
        # Regenerates docs/source/api-docs/ with the same invocation documented
        # in docs/source/for_developers/edit_docs.md. If anything changes, the
        # committed API docs are stale — fail the job with a helpful hint.
        run: |
          # actions/checkout inside a container can leave the workspace as an
          # "unsafe" git repo for the runner user; mark it safe so `git diff`
          # works.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          sphinx-apidoc \
            -o docs/source/api-docs \
            -H "CrocoDash API Docs" \
            --force \
            CrocoDash \
            CrocoDash/rm6 \
            CrocoDash/visualCaseGen

          if ! git diff --quiet -- docs/source/api-docs/; then
            echo "::error::API docs are out of date. Run this locally and commit the result:"
            echo "  cd docs && sphinx-apidoc -o source/api-docs -H 'CrocoDash API Docs' --force ../CrocoDash ../CrocoDash/rm6 ../CrocoDash/visualCaseGen"
            echo ""
            echo "--- diff ---"
            git --no-pager diff -- docs/source/api-docs/
            exit 1
          fi
        shell: bash
      - name: Sphinx build
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            sphinx-build docs/source _build/pr-${{ github.event.number }}
          else
            sphinx-build docs/source _build
          fi
        shell: bash
      - name: Deploy PR preview to GitHub Pages
        if: github.event_name == 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: _build/pr-${{ github.event.number }}
          destination_dir: pr-${{ github.event.number }}
          keep_files: false 

      - name: Comment PR with preview link
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            📄 Preview your docs here:
            👉 https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.number }}/index.html

      - name: Deploy main to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _build/
          destination_dir: latest
