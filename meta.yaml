package:
  name: crocodash
  version: "0.1.0"

source:
  path: ../CrocoDash  # Relative path to your local source

build:
  number: 0
  # The script installs your package without trying to fetch deps from PyPI
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - python >=3.11.10,<3.12
    - pip
    - setuptools
  run:
    - python >=3.11.10,<3.12
    - regional-mom6
    - mom6_forge
    - esmpy >=8.6.1,<8.7.0
    - pydeps >=3.0.1,<3.1.0
    - graphviz >=12.2.1,<12.3.0
    - python-graphviz >=0.20.3,<0.21.0
    - nbsphinx >=0.9.6,<0.10.0
    - cdsapi >=0.7.6,<0.8.0
    - pytest-cov >=7.0.0,<7.1.0
    - h5netcdf >=1.7.3,<1.8.0
    - myst-parser >=4.0.0,<4.1.0
    - sphinx-book-theme >=1.1.4,<1.2.0

test:
  imports:
    - CrocoDash
    - regional_mom6
    - visualCaseGen
    - mom6_forge
    - ipyfilechooser

about:
  summary: Regional MOM6 within the CESM Setup Tool
  license: Apache-2.0
  license_file: LICENSE.md
  homepage: https://github.com/CROCODILE-CESM/CrocoDash

extra:
  recipe-maintainers:
    - alperaltuntas
    - manishvenu