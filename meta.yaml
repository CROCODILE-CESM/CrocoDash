package:
  name: crocodash
  version: "0.1.0"

source:
  path: ../CrocoDash  # Relative path to your local source

build:
  number: 0
  # The script installs your package without trying to fetch deps from PyPI
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - python >=3.11.10,<3.12
    - pip
    - setuptools
  run:
    - python >=3.11.10,<3.12
    - regional-mom6  # Added from your list
    - esmpy >=8.6.1,<8.7.0
    - pydeps >=3.0.1,<3.1.0
    - graphviz >=12.2.1,<12.3.0
    - python-graphviz >=0.20.3,<0.21.0
    - nbsphinx >=0.9.8,<0.10.0  # Kept the stricter pin
    - cdsapi >=0.7.6,<0.8.0
    - pytest-cov >=7.1.0,<7.2.0  # Merged/updated versions
    - h5netcdf >=1.7.3,<1.8.0
    - myst-parser >=4.0.0,<4.1.0
    - sphinx-book-theme >=1.1.4,<1.2.0
    - setuptools >=69.0,<82.1
    - numpy >=1.26,<2.5.0
    - xarray >=2023.12,<2026.3.0
    - matplotlib >=3.9,<3.11.0
    - scipy >=1.11,<1.18.0
    - netcdf4 >=1.6,<1.8.0
    - jupyterlab >=4.0,<4.6.0
    - ipympl >=0.9.4,<0.11.0
    - ipywidgets >=8.1.1,<8.2.0
    - sphinx >=8.1,<9.2.0
    - sphinx_rtd_theme >=3.0,<3.2.0
    - black >=24.1,<26.4.0
    - pytest >=8.0,<9.1.0
    - gitpython >=3.1,<3.2.0
    - cartopy >=0.23,<0.30
    - xesmf >=0.8.10,<1.0.0

test:
  imports:
    - CrocoDash
    - regional_mom6
    - visualCaseGen
    - mom6_forge
    - ipyfilechooser

about:
  summary: Regional MOM6 within the CESM Setup Tool
  license: Apache-2.0
  license_file: LICENSE.md
  homepage: https://github.com/CROCODILE-CESM/CrocoDash

extra:
  recipe-maintainers:
    - alperaltuntas
    - manishvenu